<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسح الباركود - حضور</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0c1a2e; min-height: 100vh; color: white; }

        nav {
            background: #0EA5E9;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 1.3rem; font-weight: 800; color: white; }
        .nav-title { font-size: 1rem; opacity: 0.9; }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        .camera-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #000;
            aspect-ratio: 1;
        }
        #video { width: 100%; height: 100%; object-fit: cover; display: block; }

        .scan-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 200px; height: 200px;
            border: 3px solid #0EA5E9;
            border-radius: 15px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
        }
        .corner {
            position: absolute;
            width: 20px; height: 20px;
            border-color: #0EA5E9;
            border-style: solid;
        }
        .corner.tl { top: -3px; right: -3px; border-width: 3px 0 0 3px; border-radius: 0 0 0 5px; }
        .corner.tr { top: -3px; left: -3px; border-width: 3px 3px 0 0; border-radius: 0 0 5px 0; }
        .corner.bl { bottom: -3px; right: -3px; border-width: 0 0 3px 3px; border-radius: 0 5px 0 0; }
        .corner.br { bottom: -3px; left: -3px; border-width: 0 3px 3px 0; border-radius: 5px 0 0 0; }

        .scan-line {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #0EA5E9, transparent);
            animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        canvas { display: none; }

        .result-card {
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
        .result-card.success { background: #0d3b2e; border: 2px solid #22c55e; display: block; }
        .result-card.error { background: #3b0d0d; border: 2px solid #ef4444; display: block; }
        .result-card.warning { background: #3b2d0d; border: 2px solid #f59e0b; display: block; }

        .result-icon { font-size: 3rem; margin-bottom: 10px; }
        .result-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 8px; }
        .result-name { font-size: 1.6rem; font-weight: 900; margin-bottom: 5px; color: #22c55e; }
        .result-sub { opacity: 0.7; font-size: 0.9rem; }

        .btn-reset {
            background: #0EA5E9;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            font-family: inherit;
            width: 100%;
        }

        .status-bar {
            background: #1a2744;
            border-radius: 12px;
            padding: 14px 20px;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .recent-list { }
        .recent-title { color: #888; font-size: 0.85rem; margin-bottom: 10px; }
        .recent-item {
            background: #1a2744;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .recent-name { font-weight: bold; font-size: 0.95rem; }
        .recent-time { color: #888; font-size: 0.8rem; }
        .badge-ok { background: #0d3b2e; color: #22c55e; padding: 3px 10px; border-radius: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav>
    <div class="logo">حضور.</div>
    <div class="nav-title">📷 مسح بطاقات الدخول</div>
</nav>

<div class="container">
    <div class="camera-wrapper">
        <video id="video" autoplay muted playsinline></video>
        <div class="scan-overlay">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
            <div class="scan-line"></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="result-card" id="result-card">
        <div class="result-icon" id="result-icon"></div>
        <div class="result-title" id="result-title"></div>
        <div class="result-name" id="result-name"></div>
        <div class="result-sub" id="result-sub"></div>
        <button class="btn-reset" onclick="resetScanner()">مسح باركود آخر</button>
    </div>

    <div class="status-bar" id="status-bar">وجّه الكاميرا نحو الباركود</div>

    <div class="recent-list" id="recent-list"></div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let scanning = true;
    let lastScanned = '';
    let recentEntries = [];

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
            video.play();
            requestAnimationFrame(scanFrame);
        } catch {
            document.getElementById('status-bar').textContent = 'تعذر الوصول للكاميرا - يحتاج HTTPS';
        }
    }

    function scanFrame() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.height = video.videoHeight;
            canvas.width = video.videoWidth;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);
            if (code && scanning && code.data !== lastScanned) {
                lastScanned = code.data;
                scanning = false;
                verifyToken(code.data);
            }
        }
        if (scanning) requestAnimationFrame(scanFrame);
    }

    async function verifyToken(token) {
        document.getElementById('status-bar').textContent = 'جاري التحقق...';
        try {
            const res = await fetch(`/verify/${token}`);
            const data = await res.json();
            showResult(data);
        } catch {
            showResult({ valid: false, message: 'خطأ في الاتصال' });
        }
    }

    function showResult(data) {
        const card = document.getElementById('result-card');
        card.className = 'result-card';

        if (data.valid) {
            card.classList.add('success');
            document.getElementById('result-icon').textContent = '✅';
            document.getElementById('result-title').textContent = 'مرحباً بك!';
            document.getElementById('result-name').textContent = data.guest?.name || '';
            document.getElementById('result-sub').textContent = 'بطاقة صحيحة - تم تسجيل الدخول';
            addToRecent(data.guest?.name || '', true);
        } else if (data.message?.includes('مسبقاً')) {
            card.classList.add('warning');
            document.getElementById('result-icon').textContent = '⚠️';
            document.getElementById('result-title').textContent = 'تم الاستخدام مسبقاً!';
            document.getElementById('result-name').textContent = '';
            document.getElementById('result-sub').textContent = data.message;
        } else {
            card.classList.add('error');
            document.getElementById('result-icon').textContent = '❌';
            document.getElementById('result-title').textContent = 'باركود غير صحيح';
            document.getElementById('result-name').textContent = '';
            document.getElementById('result-sub').textContent = 'هذه البطاقة غير صالحة';
        }

        document.getElementById('status-bar').textContent = 'اضغط "مسح باركود آخر" للمتابعة';
    }

    function addToRecent(name, success) {
        if (!name) return;
        const time = new Date().toLocaleTimeString('ar');
        recentEntries.unshift({ name, time, success });
        if (recentEntries.length > 5) recentEntries.pop();
        const html = recentEntries.map(e => `
            <div class="recent-item">
                <div>
                    <div class="recent-name">${e.name}</div>
                    <div class="recent-time">${e.time}</div>
                </div>
                <span class="badge-ok">دخل ✓</span>
            </div>`).join('');
        document.getElementById('recent-list').innerHTML =
            `<div class="recent-title">آخر الداخلين:</div>${html}`;
    }

    function resetScanner() {
        document.getElementById('result-card').className = 'result-card';
        document.getElementById('status-bar').textContent = 'وجّه الكاميرا نحو الباركود';
        lastScanned = '';
        scanning = true;
        requestAnimationFrame(scanFrame);
    }

    startCamera();
</script>

</body>
</html>
