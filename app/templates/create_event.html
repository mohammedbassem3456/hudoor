<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء مناسبة - حضور</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; }

        nav {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 10px rgba(0,0,0,0.08);
        }
        .logo { font-size: 1.8rem; font-weight: 800; color: #0EA5E9; text-decoration: none; }
        .logo span { color: #1e293b; }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }

        .steps {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 40px;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            color: #aaa;
            font-size: 0.9rem;
        }
        .step.active { color: #0EA5E9; font-weight: bold; }
        .step.done { color: #22c55e; }
        .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .step.active .step-num { background: #0EA5E9; color: white; }
        .step.done .step-num { background: #22c55e; color: white; }
        .step-line { width: 50px; height: 2px; background: #e2e8f0; margin: auto; }

        .card {
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        .card h2 { color: #0c4a6e; font-size: 1.4rem; margin-bottom: 25px; }

        .types-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 10px;
        }
        .type-card {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .type-card:hover { border-color: #0EA5E9; background: #f0f9ff; }
        .type-card.selected { border-color: #0EA5E9; background: #f0f9ff; }
        .type-icon { font-size: 2rem; margin-bottom: 8px; }
        .type-card p { color: #555; font-size: 0.9rem; font-weight: 500; }

        .designs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .design-card {
            border: 3px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .design-card:hover { border-color: #0EA5E9; transform: translateY(-2px); }
        .design-card.selected { border-color: #0EA5E9; }
        .design-card.selected::after {
            content: '✓';
            position: absolute;
            top: 8px;
            left: 8px;
            background: #0EA5E9;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }
        .design-preview {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 10px;
        }
        .design-name {
            padding: 8px;
            text-align: center;
            font-size: 0.85rem;
            color: #555;
            background: white;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
            background: white;
        }
        .form-group input:focus { outline: none; border-color: #0EA5E9; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn-next {
            background: #0EA5E9;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn-next:hover { transform: translateY(-2px); }
        .btn-back {
            background: white;
            color: #0EA5E9;
            border: 2px solid #0EA5E9;
            padding: 13px 40px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
            margin-bottom: 10px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo">حضور</a>
</nav>

<div class="container">
    <div class="steps">
        <div class="step active" id="step1-indicator">
            <div class="step-num">1</div>
            <span>نوع المناسبة</span>
        </div>
        <div class="step-line"></div>
        <div class="step" id="step2-indicator">
            <div class="step-num">2</div>
            <span>التصميم</span>
        </div>
        <div class="step-line"></div>
        <div class="step" id="step3-indicator">
            <div class="step-num">3</div>
            <span>التفاصيل</span>
        </div>
    </div>

    <div id="step1">
        <div class="card">
            <h2>🎉 ما نوع مناسبتك؟</h2>
            <div class="types-grid">
                <div class="type-card" onclick="selectType(this, 'wedding')">
                    <div class="type-icon">💍</div>
                    <p>عرس</p>
                </div>
                <div class="type-card" onclick="selectType(this, 'graduation')">
                    <div class="type-icon">🎓</div>
                    <p>تخرج</p>
                </div>
                <div class="type-card" onclick="selectType(this, 'baby')">
                    <div class="type-icon">👶</div>
                    <p>مولود</p>
                </div>
                <div class="type-card" onclick="selectType(this, 'reception')">
                    <div class="type-icon">🤝</div>
                    <p>استقبال</p>
                </div>
                <div class="type-card" onclick="selectType(this, 'other')">
                    <div class="type-icon">✨</div>
                    <p>أخرى</p>
                </div>
            </div>
        </div>
        <button class="btn-next" onclick="goToStep2()">التالي ←</button>
    </div>

    <div id="step2" class="hidden">
        <div class="card">
            <h2>🎨 اختر تصميم الدعوة</h2>
            <div class="designs-grid">
                <div class="design-card" onclick="selectDesign(this, 'classic')">
                    <div class="design-preview" style="background: linear-gradient(135deg, #667eea, #764ba2)">
                        <span>كلاسيك<br>أنيق</span>
                    </div>
                    <div class="design-name">كلاسيك</div>
                </div>
                <div class="design-card" onclick="selectDesign(this, 'floral')">
                    <div class="design-preview" style="background: linear-gradient(135deg, #f093fb, #f5576c)">
                        <span>ورود<br>رومانسي</span>
                    </div>
                    <div class="design-name">ورود</div>
                </div>
                <div class="design-card" onclick="selectDesign(this, 'modern')">
                    <div class="design-preview" style="background: linear-gradient(135deg, #0EA5E9, #0284c7)">
                        <span>عصري<br>راقي</span>
                    </div>
                    <div class="design-name">عصري</div>
                </div>
                <div class="design-card" onclick="selectDesign(this, 'golden')">
                    <div class="design-preview" style="background: linear-gradient(135deg, #f7971e, #ffd200)">
                        <span>ذهبي<br>فاخر</span>
                    </div>
                    <div class="design-name">ذهبي</div>
                </div>
                <div class="design-card" onclick="selectDesign(this, 'nature')">
                    <div class="design-preview" style="background: linear-gradient(135deg, #134e5e, #71b280)">
                        <span>طبيعي<br>هادئ</span>
                    </div>
                    <div class="design-name">طبيعي</div>
                </div>
                <div class="design-card" onclick="selectDesign(this, 'minimal')">
                    <div class="design-preview" style="background: linear-gradient(135deg, #2c3e50, #4a6fa5)">
                        <span>مينيمال<br>بسيط</span>
                    </div>
                    <div class="design-name">مينيمال</div>
                </div>
            </div>
        </div>
        <button class="btn-back" onclick="goToStep1()">← رجوع</button>
        <button class="btn-next" onclick="goToStep3()">التالي ←</button>
    </div>

    <div id="step3" class="hidden">
        <div class="card">
            <h2>📝 تفاصيل المناسبة</h2>
            <div class="form-group">
                <label>اسم المناسبة *</label>
                <input type="text" id="title" placeholder="مثال: حفل زواج محمد وسارة">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>اسمك *</label>
                    <input type="text" id="owner_name" placeholder="اسمك الكامل">
                </div>
                <div class="form-group">
                    <label>رقم جوالك *</label>
                    <input type="text" id="owner_phone" placeholder="05xxxxxxxx">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>التاريخ والوقت</label>
                    <input type="datetime-local" id="event_date">
                </div>
                <div class="form-group">
                    <label>المكان</label>
                    <input type="text" id="location" placeholder="قاعة الماسة - الرياض">
                </div>
            </div>
            <div class="form-group">
                <label>وصف المناسبة (اختياري)</label>
                <input type="text" id="description" placeholder="تشرفون بحضوركم...">
            </div>
        </div>
        <button class="btn-back" onclick="goToStep2()">← رجوع</button>
        <button class="btn-next" onclick="submitEvent()">إنشاء المناسبة 🎉</button>
    </div>
</div>

<script>
    let selectedType = '';
    let selectedDesign = '';
    const params = new URLSearchParams(window.location.search);

    function selectType(card, type) {
        document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedType = type;
    }

    function selectDesign(card, design) {
        document.querySelectorAll('.design-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedDesign = design;
    }

    function goToStep1() {
        document.getElementById('step1').classList.remove('hidden');
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step1-indicator').classList.add('active');
        document.getElementById('step2-indicator').classList.remove('active');
        document.getElementById('step2-indicator').classList.remove('done');
    }

    function goToStep2() {
        if (!selectedType) { alert('الرجاء اختيار نوع المناسبة'); return; }
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        document.getElementById('step1-indicator').classList.remove('active');
        document.getElementById('step1-indicator').classList.add('done');
        document.getElementById('step2-indicator').classList.add('active');
    }

    function goToStep3() {
        if (!selectedDesign) { alert('الرجاء اختيار تصميم الدعوة'); return; }
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        document.getElementById('step2-indicator').classList.remove('active');
        document.getElementById('step2-indicator').classList.add('done');
        document.getElementById('step3-indicator').classList.add('active');
    }

    async function submitEvent() {
        const title = document.getElementById('title').value;
        const owner_name = document.getElementById('owner_name').value;
        const owner_phone = document.getElementById('owner_phone').value;

        if (!title || !owner_name || !owner_phone) {
            alert('الرجاء تعبئة جميع الحقول المطلوبة');
            return;
        }

        try {
            const event = {
                title,
                description: document.getElementById('description').value,
                event_date: document.getElementById('event_date').value || null,
                location: document.getElementById('location').value,
                owner_name,
                owner_phone,
                event_type: selectedType,
                package_type: params.get('plan') || 'basic'
            };

            const res = await fetch('/events', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(event)
            });

            const data = await res.json();

            if (data.success) {
                window.location.href = `/event-details?id=${data.event.id}`;
            } else {
                alert('حدث خطأ: ' + JSON.stringify(data));
            }
        } catch(err) {
            alert('خطأ: ' + err.message);
        }
    }
</script>

</body>
</html>
